<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管理員登入</title><style>body{margin:0;background:#0b0f1a;color:#fff;font-family:Arial,'Microsoft JhengHei'}.box{max-width:380px;margin:12vh auto;background:#151b2e;padding:28px;border-radius:18px}input,button{width:100%;padding:13px;margin:8px 0;border-radius:12px;border:0}button{background:#7c5cff;color:white;font-weight:bold}.err{color:#ff8585}</style></head><body><div class="box"><h2>管理員登入</h2>{% if error %}<div class="err">{{error}}</div>{% endif %}<form method="post"><input name="username" value="admin"><input name="password" type="password" placeholder="密碼"><button>登入後台</button></form></div></body></html>
