
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Admin</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
}
table{
    width:100%;
    border-collapse:collapse;
}
td,th{
    border:1px solid #444;
    padding:10px;
}
a{
    color:#0af;
}
</style>
</head>
<body>

<h1>管理員後台</h1>

<a href="/logout">登出</a>

<table>
<tr>
<th>ID</th>
<th>桌號</th>
<th>結果</th>
<th>手動輸入</th>
<th>時間</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
