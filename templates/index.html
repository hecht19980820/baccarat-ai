
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Baccarat AI</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
.btn{
    padding:15px 30px;
    margin:10px;
    font-size:24px;
}
.roadmap{
    margin-top:20px;
    border:1px solid #444;
    min-height:200px;
    padding:10px;
}
</style>
</head>
<body>

<h1>Baccarat AI System</h1>

<select id="table">
<option>DG-RB01</option>
<option>DG-RB02</option>
<option>MT-1</option>
<option>MT-2</option>
</select>

<br><br>

<button class="btn" onclick="send('莊')">莊</button>
<button class="btn" onclick="send('閒')">閒</button>
<button class="btn" onclick="send('和')">和</button>

<br>

<button onclick="manualInput()">手動輸入牌型</button>
<button onclick="undo()">撤回</button>
<button onclick="clearTable()">清除此桌</button>

<div class="roadmap" id="roadmap"></div>

<script>
let roadmap = [];
let history = [];

function render(){
    document.getElementById("roadmap").innerHTML = roadmap.join(" ");
}

function send(result, manual=0){

    if(!manual){
        history.push(result);
    }

    roadmap.push(result);
    render();

    fetch("/add_record",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            table:document.getElementById("table").value,
            result:result,
            manual:manual
        })
    });
}

function manualInput(){
    let r = prompt("輸入牌型");
    if(r){
        send(r,1);
    }
}

function undo(){
    roadmap.pop();
    history.pop();
    render();
}

function clearTable(){
    roadmap = [];
    render();
}
</script>

</body>
</html>
