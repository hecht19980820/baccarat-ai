<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管理後台</title><style>body{margin:0;background:#eef2f7;font-family:Arial,'Microsoft JhengHei';color:#152033}header{background:#111827;color:white;padding:14px 20px;display:flex;justify-content:space-between}.wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:white;border-radius:16px;padding:16px;box-shadow:0 6px 18px #0001}input,select,button{padding:10px;border-radius:10px;border:1px solid #ccd;margin:4px}button{background:#111827;color:white;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #eee;padding:8px;text-align:left}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><header><b>AI 百家樂管理後台</b><div><a style="color:#aee" href="/">玩家端</a>　<a style="color:#aee" href="/logout">登出</a></div></header><div class="wrap"><section class="card"><h2>玩家 / 代理管理</h2><input id="u" placeholder="帳號"><input id="p" placeholder="密碼" value="123456"><select id="role"><option value="player">玩家</option><option value="agent">代理</option><option value="admin">管理員</option></select><input id="agent" placeholder="上層代理"><button onclick="addUser()">新增會員</button><table><thead><tr><th>帳號</th><th>角色</th><th>代理</th><th>操作</th></tr></thead><tbody id="users"></tbody></table></section><section class="card"><h2>系統狀態</h2><p>SQLite 資料庫：啟用</p><p>桌號獨立模型：啟用</p><p>玩家共享雲端統計：啟用</p><p>序號模式：預設關閉，日後可用環境變數 SERIAL_ENABLED=1 開啟。</p><hr><h3>桌號</h3><p>DG：{{dg|join(', ')}}</p><p>MT：{{mt|join(', ')}}</p></section></div><script>async function loadUsers(){let r=await fetch('/api/users');let j=await r.json();users.innerHTML='';j.forEach(x=>{users.innerHTML+=`<tr><td>${x.username}</td><td>${x.role}</td><td>${x.agent||''}</td><td><button onclick="delUser(${x.id})">刪除</button></td></tr>`})}async function addUser(){await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value,role:role.value,agent:agent.value})});u.value='';loadUsers()}async function delUser(id){if(confirm('刪除會員？')){await fetch('/api/users',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});loadUsers()}}loadUsers();</script></body></html>
