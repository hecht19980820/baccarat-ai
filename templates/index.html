<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 百家樂玩家端</title><style>body{margin:0;background:#07111f;color:#eaf2ff;font-family:Arial,'Microsoft JhengHei'}header{display:flex;gap:10px;align-items:center;padding:10px;background:#0e1830;position:sticky;top:0}.pill,select,button,input{border:0;border-radius:10px;padding:10px}button{cursor:pointer;font-weight:700}.b{background:#ff4d5f;color:white}.p{background:#49a2ff;color:white}.t{background:#35c486;color:white}.g{background:#263653;color:#fff}.wrap{display:grid;grid-template-columns:1fr 320px;gap:12px;padding:12px}.road{background:#101b31;border-radius:16px;padding:10px;min-height:430px}.grid{display:grid;grid-template-rows:repeat(6,38px);grid-auto-flow:column;grid-auto-columns:38px;gap:4px;overflow:auto}.cell{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid #ffffff22}.side{background:#101b31;border-radius:16px;padding:14px}.pick{font-size:56px;font-weight:900;text-align:center}.small{opacity:.75}.cards{display:flex;gap:8px;flex-wrap:wrap}dialog{background:#101b31;color:#fff;border:1px solid #334;border-radius:16px;padding:20px}@media(max-width:850px){.wrap{grid-template-columns:1fr}.pick{font-size:42px}}</style></head><body><header><b>AI 百家樂</b><select id="provider"><option>DG</option><option>MT</option></select><select id="table"></select><button class="g" onclick="load()">切換桌</button><a style="color:#8cc8ff;margin-left:auto" href="/logout">登出</a></header><div class="wrap"><main class="road"><div class="cards"><button class="b" onclick="add('B')">莊</button><button class="p" onclick="add('P')">閒</button><button class="t" onclick="add('T')">和</button><button class="g" onclick="openManual()">手動輸入牌型</button><button class="g" onclick="undo()">撤回</button><button class="g" onclick="clearTable()">清除此桌</button></div><h3>大路盤</h3><div id="road" class="grid"></div></main><aside class="side"><div class="small">AI 大數據建議</div><div id="pick" class="pick">-</div><div id="conf"></div><hr><div id="why"></div><hr><div id="stats"></div><p class="small">手動補大路盤可選「不計入下注次數」。DG / MT 與桌號資料分開計算。</p></aside></div><dialog id="dlg"><h3>手動輸入牌型</h3><p class="small">格式例：0.2.8.0 或 0,2,8,0，前兩個閒、後兩個莊</p><input id="cards" placeholder="0.2.8.0"><label><input type="checkbox" id="counted"> 計入下注次數</label><br><br><button class="g" onclick="submitCards()">送出</button><button onclick="dlg.close()">取消</button></dialog><script>const DG={{dg|tojson}}, MT={{mt|tojson}};const table=document.getElementById('table'),provider=document.getElementById('provider');function fill(){table.innerHTML='';(provider.value==='DG'?DG:MT).forEach(x=>table.add(new Option(x,x)))}provider.onchange=()=>{fill();load()};fill();function cls(r){return r==='B'?'b':r==='P'?'p':'t'}function txt(r){return r==='B'?'莊':r==='P'?'閒':'和'}async function load(){let r=await fetch(`/api/state?provider=${provider.value}&table=${table.value}`);let j=await r.json();road.innerHTML='';j.rows.forEach(x=>{let d=document.createElement('div');d.className='cell '+cls(x.result);d.textContent=txt(x.result);road.appendChild(d)});pick.textContent=txt(j.prediction.pick);pick.className='pick '+cls(j.prediction.pick);conf.textContent='信心值：'+j.prediction.confidence+'%';why.textContent=j.prediction.why;stats.innerHTML=`莊 ${j.prediction.b}｜閒 ${j.prediction.p}｜和 ${j.prediction.t}｜總 ${j.prediction.total}`}
async function add(r){await fetch('/api/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:provider.value,table:table.value,result:r,manual:0,counted:1})});load()}function openManual(){cards.value='';counted.checked=false;dlg.showModal()}async function submitCards(){await fetch('/api/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:provider.value,table:table.value,result:'AUTO',cards:cards.value,manual:1,counted:counted.checked?1:0})});dlg.close();load()}async function undo(){await fetch('/api/undo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:provider.value,table:table.value})});load()}async function clearTable(){if(confirm('確定清除這桌？')){await fetch('/api/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:provider.value,table:table.value})});load()}}load();</script></body></html>
